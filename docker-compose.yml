# Pin images for reproducible builds; bump tags deliberately after testing.
services:
  neo4j:
    image: neo4j:5.26.2-community
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    environment:
      # Default password is for local dev only — override NEO4J_PASSWORD in .env for anything exposed.
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-aria_dev_password}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-aria_dev_password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.15
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    profiles:
      - full

volumes:
  neo4j_data:
  chroma_data:
