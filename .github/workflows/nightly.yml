name: Nightly E2E Eval

on:
  schedule:
    - cron: "30 3 * * *"   # 03:30 UTC daily
  workflow_dispatch:        # manual trigger

jobs:
  e2e-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      neo4j:
        image: neo4j:5.26.2-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/aria_dev_password
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j -p aria_dev_password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      chromadb:
        image: chromadb/chroma:1.5.6
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v2/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: aria_dev_password
      CHROMA_HOST: localhost
      CHROMA_PORT: "8000"
      ARIA_PLACEHOLDER_API: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Seed corpus and graph
        run: |
          python scripts/seed_corpus.py
          python scripts/seed_graph.py

      - name: E2E live query tests
        run: |
          python -m pytest tests/eval/e2e/ \
            -m integration -v --tb=short

      - name: Golden set (all tiers, with eval store)
        run: |
          python -m pytest tests/eval/golden_set/test_goldens.py \
            --golden-tier=slow --emit-eval-store -m golden -v --tb=short

      - name: Full eval suite
        run: |
          python -m pytest tests/eval/ -v --tb=short

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            golden_report.json
            golden_report.xml
            tests/eval/eval_runs/
          retention-days: 30
