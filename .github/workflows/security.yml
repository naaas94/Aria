name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project and audit environment
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"
      - name: pip-audit
        run: pip-audit
