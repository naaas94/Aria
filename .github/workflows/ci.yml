name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      # Eval modules that do not import the FastAPI app; orchestration contract tests are mandatory.
      - name: Eval tests (trajectory, traces, graphrag benchmarks)
        run: |
          python -m pytest \
            tests/eval/test_trajectory_eval.py \
            tests/eval/agent_trace_analysis.py \
            tests/eval/graphrag_vs_vector_rag.py \
            -m eval -v --tb=short

      - name: Unit tests
        run: python -m pytest tests/unit -v --tb=short
