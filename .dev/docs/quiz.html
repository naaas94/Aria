<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — Knowledge Quiz</title>
<style>
:root {
  --color-background-primary: #0d1117;
  --color-background-secondary: #161b22;
  --color-text-primary: #e6edf3;
  --color-text-secondary: #8b949e;
  --color-border-tertiary: #30363d;
  --color-border-secondary: #484f58;
  --color-background-success: #12261e;
  --color-background-danger: #2d1117;
  --color-background-info: #12233d;
  --color-text-success: #3fb950;
  --color-text-danger: #f85149;
  --color-text-info: #58a6ff;
  --color-border-success: #238636;
  --color-border-danger: #da3633;
  --color-border-info: #1f6feb;
  --border-radius-md: 6px;
  --border-radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  font-weight: 400;
  background: transparent;
  color: var(--color-text-primary);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px;
}

.app {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── Category bar ── */
.category-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.category-pill {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-tertiary);
  background: var(--color-background-secondary);
  color: var(--color-text-secondary);
  cursor: default;
  white-space: nowrap;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.category-pill.active {
  background: var(--color-background-info);
  color: var(--color-text-info);
  border-color: var(--color-border-info);
}
.category-pill.completed {
  background: var(--color-background-success);
  color: var(--color-text-success);
  border-color: var(--color-border-success);
}

/* ── Metrics ── */
.metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.metric-card {
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 12px;
  text-align: center;
}
.metric-card .label {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.metric-card .value {
  font-size: 24px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-top: 2px;
}

/* ── Question card ── */
.question-card {
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 28px 24px 24px;
}
.question-topic {
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-info);
  margin-bottom: 12px;
}
.question-counter {
  font-size: 12px;
  color: var(--color-text-secondary);
  float: right;
}
.question-text {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--color-text-primary);
  white-space: pre-line;
}

/* ── Options grid ── */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}
.option-btn {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 400;
  padding: 14px 16px;
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
  line-height: 1.4;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--color-border-secondary);
}
.option-btn:disabled { cursor: default; }
.option-btn.correct {
  background: var(--color-background-success);
  border-color: var(--color-border-success);
  color: var(--color-text-success);
}
.option-btn.wrong {
  background: var(--color-background-danger);
  border-color: var(--color-border-danger);
  color: var(--color-text-danger);
}

/* ── Feedback bar ── */
.feedback-bar {
  border-radius: var(--border-radius-md);
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.5;
  display: none;
}
.feedback-bar.show { display: block; }
.feedback-bar.correct-fb {
  background: var(--color-background-success);
  border: 1px solid var(--color-border-success);
  color: var(--color-text-success);
}
.feedback-bar.wrong-fb {
  background: var(--color-background-danger);
  border: 1px solid var(--color-border-danger);
  color: var(--color-text-danger);
}

/* ── Next button ── */
.next-btn {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  padding: 12px 24px;
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-info);
  background: var(--color-background-info);
  color: var(--color-text-info);
  cursor: pointer;
  align-self: flex-end;
  display: none;
  transition: opacity 0.15s;
}
.next-btn:hover { opacity: 0.85; }
.next-btn.show { display: inline-block; }

/* ── End screen ── */
.end-screen {
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 40px 24px;
  text-align: center;
  display: none;
}
.end-screen.show { display: block; }
.end-screen h2 {
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 8px;
}
.end-screen p {
  font-size: 15px;
  color: var(--color-text-secondary);
  margin-bottom: 20px;
}
.restart-btn {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  padding: 10px 28px;
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-info);
  background: var(--color-background-info);
  color: var(--color-text-info);
  cursor: pointer;
}
.restart-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="app">
  <div class="category-bar" id="categoryBar"></div>

  <div class="metrics">
    <div class="metric-card"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="metric-card"><div class="label">Correct</div><div class="value" id="correctCount">0 / 0</div></div>
    <div class="metric-card"><div class="label">Streak</div><div class="value" id="streak">0</div></div>
  </div>

  <div class="question-card" id="questionCard">
    <span class="question-counter" id="questionCounter"></span>
    <div class="question-topic" id="questionTopic"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>

  <div class="feedback-bar" id="feedbackBar"></div>
  <button class="next-btn" id="nextBtn">Next →</button>

  <div class="end-screen" id="endScreen">
    <h2 id="endTitle"></h2>
    <p id="endSummary"></p>
    <button class="restart-btn" id="restartBtn">Restart Deck</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// QUESTION BANK — one gen() per question
// ─────────────────────────────────────────────
const CATEGORIES = [
  "Project Overview",
  "Knowledge Graphs",
  "Property Graph Schema",
  "GraphRAG vs Vector RAG",
  "Graph Neural Networks",
  "MCP Protocol",
  "A2A Protocol",
  "Agent Orchestration",
  "Scratch Engine",
  "LangGraph Reference",
  "Evaluation",
  "Tradeoffs"
];

function t(q, ans, hint, isText) { return { q, ans, hint: hint || "", isText: !!isText }; }

const QUESTION_BANK = [

  // ═══════════════════════════════════════════
  // PROJECT OVERVIEW
  // ═══════════════════════════════════════════
  { cat: "Project Overview", gen() { return t(
    "What does ARIA stand for?",
    "Automated Regulatory Impact Agent",
    "ARIA = Automated Regulatory Impact Agent — it ingests regulatory documents and answers multi-hop compliance questions.",
    true
  ); }},
  { cat: "Project Overview", gen() { return t(
    "ARIA answers compliance questions by chaining through how many entity types in its core traversal path (regulation → articles → requirements → systems → teams)?",
    5,
    "The chain is: Regulation → Article → Requirement → InternalSystem → Team — five entity types, with a policy-coverage check along the way."
  ); }},
  { cat: "Project Overview", gen() { return t(
    "Which graph database does ARIA use to store its knowledge graph?",
    "Neo4j",
    "ARIA uses Neo4j as its property graph store. Cypher is the query language.",
    true
  ); }},
  { cat: "Project Overview", gen() { return t(
    "Which vector database does ARIA use for chunk embeddings?",
    "ChromaDB",
    "ChromaDB stores embedded document chunks for dense retrieval (cosine similarity search).",
    true
  ); }},
  { cat: "Project Overview", gen() { return t(
    "In ARIA's architecture, what routes work to specialized agents like ingestion, entity extraction, and impact analysis?",
    "A supervisor",
    "A supervisor agent classifies intent and delegates to specialized agents — the supervisor pattern is ARIA's core orchestration approach.",
    true
  ); }},
  { cat: "Project Overview", gen() { return t(
    "Which protocol do ARIA agents use to discover and call tools safely?",
    "MCP",
    "MCP (Model Context Protocol) is used for tool exposure — agents discover and call tools like graph_query, vector_search, etc.",
    true
  ); }},
  { cat: "Project Overview", gen() { return t(
    "Which protocol do ARIA agents use to delegate tasks to each other across process boundaries?",
    "A2A",
    "A2A (Agent-to-Agent) protocol handles cross-process delegation using agent cards, registries, and task envelopes.",
    true
  ); }},
  { cat: "Project Overview", gen() { return t(
    "How many specialized agents does ARIA define (supervisor, ingestion, entity_extractor, graph_builder, impact_analyzer, report_generator)?",
    6,
    "Six agents: supervisor, ingestion_agent, entity_extractor, graph_builder, impact_analyzer, and report_generator."
  ); }},
  { cat: "Project Overview", gen() { return t(
    "Documents in ARIA are identified for idempotent re-ingestion by what mechanism?",
    "Content hash",
    "Documents are identified by content hash. Re-ingesting the same document is a no-op; graph writes use MERGE (create-or-update).",
    true
  ); }},
  { cat: "Project Overview", gen() { return t(
    "ARIA ships two orchestration implementations. The scratch version is pedagogical. What framework does the other one use?",
    "LangGraph",
    "The LangGraph reference implementation implements the same graph topology using LangGraph's StateGraph to show what the framework buys you.",
    true
  ); }},

  // ═══════════════════════════════════════════
  // KNOWLEDGE GRAPHS
  // ═══════════════════════════════════════════
  { cat: "Knowledge Graphs", gen() { return t(
    "In a property graph (LPG), what are the two primary data containers that carry properties?",
    "Nodes and edges",
    "Property graphs store data on nodes (entities) and directed edges (relationships). Both can carry key-value properties.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "What query language does Neo4j use for pattern matching on property graphs?",
    "Cypher",
    "Cypher is Neo4j's declarative pattern-matching language, using ASCII-art-like syntax for graph patterns.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "RDF expresses knowledge as a set of what atomic unit?",
    "Triples",
    "RDF uses triples: (subject, predicate, object). Subjects/objects are often IRIs; predicates come from shared vocabularies.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "What is the W3C query language used for RDF graphs?",
    "SPARQL",
    "SPARQL is the W3C standard query language for RDF triple stores.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "ARIA does NOT pass user-supplied Cypher to the database. Instead, it uses what kind of queries?",
    "Named parameterized queries",
    "aria/graph/queries.py registers named CypherQuery objects with fixed Cypher strings and explicit parameter_names. Only these registered names are valid.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "In Neo4j, what idempotent operation creates a node if absent or updates it if present?",
    "MERGE",
    "MERGE is the idempotent upsert primitive: match on key properties or create if absent. ARIA favors MERGE on 'id' so re-runs don't duplicate entities.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "Graphs tend to beat relational databases when questions are inherently what?",
    "Navigational",
    "Questions like 'regulation → article → requirement → system → team' are inherently navigational — they map to multi-hop graph patterns, not chains of SQL joins.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "How many node labels does ARIA define (Regulation, Article, Requirement, PolicyDocument, InternalSystem, Team, Jurisdiction, Deadline)?",
    8,
    "Eight labels: Regulation, Article, Requirement, PolicyDocument, InternalSystem, Team, Jurisdiction, and Deadline."
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "In ARIA's Cypher query library, what does the 'expand_two_hops' query use for bounded variable-length paths?",
    "[*1..2]",
    "The two-hop expansion uses pattern (n)-[*1..2]-(neighbor) to match paths of length 1 or 2 from the anchor node.",
    true
  ); }},
  { cat: "Knowledge Graphs", gen() { return t(
    "Which ARIA module wraps the Neo4j driver and executes named read queries?",
    "aria/graph/client.py",
    "Neo4jClient in aria/graph/client.py is the async Neo4j driver wrapper used by GraphRetriever and MCP tools.",
    true
  ); }},

  // ═══════════════════════════════════════════
  // PROPERTY GRAPH SCHEMA
  // ═══════════════════════════════════════════
  { cat: "Property Graph Schema", gen() { return t(
    "What single property does ARIA use as the merge key for ALL node labels?",
    "id",
    "NODE_MERGE_KEYS maps every NodeLabel to 'id' — one canonical business key per entity type for simplicity.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "What relationship type connects Regulation → Article in the ARIA schema?",
    "CONTAINS",
    "CONTAINS represents hierarchical containment: a Regulation CONTAINS Articles.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "What relationship type connects Article → Requirement?",
    "IMPOSES",
    "An Article IMPOSES a Requirement — mapping legal text to a normalized obligation.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "What relationship type represents that a Requirement is covered by a PolicyDocument?",
    "ADDRESSED_BY",
    "ADDRESSED_BY connects Requirement → PolicyDocument, showing coverage. Gap queries check for missing ADDRESSED_BY edges.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "What relationship type connects Requirement → InternalSystem?",
    "AFFECTS",
    "AFFECTS means a requirement impacts a specific internal system in the organization.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "Both PolicyDocument and InternalSystem connect to Team via what relationship type?",
    "OWNED_BY",
    "OWNED_BY connects both PolicyDocument → Team and InternalSystem → Team, tracking organizational ownership.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "How many valid directed edge patterns are defined in ARIA's VALID_EDGES list?",
    10,
    "Ten triples: CONTAINS, IMPOSES, AMENDS, REFERENCES, APPLIES_IN, AFFECTS, ADDRESSED_BY, two OWNED_BY patterns, and HAS_DEADLINE."
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "Why does ARIA model Deadlines as separate nodes rather than date properties on Article?",
    "They can be shared, revised, or traversed as first-class events",
    "Deadline nodes support MERGE, GraphRAG traversal via HAS_DEADLINE, and avoid overloading articles with multiple dates.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "What data structure in aria/graph/schema.py restricts which (source, relationship, target) triples are allowed?",
    "VALID_EDGES",
    "VALID_EDGES is a list of allowed (source_label, EdgeType, target_label) triples — a lightweight schema guard against garbage edges.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "What kind of Neo4j DDL does generate_constraint_statements() produce for each node label?",
    "Uniqueness constraints on id",
    "For each label, it generates CREATE CONSTRAINT … REQUIRE n.id IS UNIQUE, preventing duplicate entities.",
    true
  ); }},
  { cat: "Property Graph Schema", gen() { return t(
    "What relationship types connect Regulation → Regulation for cross-instrument linkage?",
    "AMENDS and REFERENCES",
    "AMENDS and REFERENCES are both Regulation → Regulation relationships for tracking amendment chains and cross-references.",
    true
  ); }},

  // ═══════════════════════════════════════════
  // GRAPHRAG vs VECTOR RAG
  // ═══════════════════════════════════════════
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "What are the four steps of ARIA's hybrid query phase?",
    "Embed, Anchor, Expand, Fuse",
    "Embed → Anchor (vector hits supply starting nodes) → Expand (graph traversal from anchors) → Fuse (rerank merged evidence).",
    true
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "In ARIA's reranker, what is the GRAPH_BOOST value added to chunks that appear in graph neighborhoods?",
    0.15,
    "GRAPH_BOOST = 0.15. Chunks found in both vector results and graph neighborhoods get a 0.15 boost to their score."
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "How many of the top vector chunks does ARIA use as anchor candidates for graph expansion?",
    5,
    "For each of the first five chunks (vector_chunks[:5]), the retriever reads node_id from metadata for graph expansion."
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "What is the default value of graph_hops in HybridRetriever?",
    1,
    "Default graph_hops is 1 (uses expand_one_hop). Setting it to 2 uses expand_two_hops for deeper paths."
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "What is the default vector_top_k in HybridRetriever?",
    10,
    "vector_top_k defaults to 10 — the breadth of semantic recall from ChromaDB."
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "ARIA's reranker is described as what kind of scoring approach (not a learned cross-encoder)?",
    "Interpretable heuristic",
    "The reranker uses an interpretable heuristic: base = vector similarity + GRAPH_BOOST if seen in graph. No ML model is trained.",
    true
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "What graph feature does the full Microsoft GraphRAG paper include that ARIA intentionally omits?",
    "Community detection",
    "ARIA omits Leiden-style community detection and community summary embedding. Faster indexing, smaller codebase, but less global summarization.",
    true
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "What is the default node_label_hint used in HybridRetriever when expanding graph anchors?",
    "Article",
    "node_label_hint defaults to 'Article' because chunks often anchor to article-level nodes. Misalignment with actual metadata reduces match quality.",
    true
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "Vector RAG is strong at semantic fuzziness. What key weakness does it have for compliance questions?",
    "Lost relational context",
    "Vector RAG loses relational context — chunks mentioning a requirement and a system may not co-occur, and multi-hop paths aren't captured by embeddings.",
    true
  ); }},
  { cat: "GraphRAG vs Vector RAG", gen() { return t(
    "What base score does the reranker assign to graph-only anchors that are NOT in vector results?",
    0.5,
    "Graph-only anchors not in vector results get a fixed base of 0.5 plus the GRAPH_BOOST (0.15), totaling 0.65."
  ); }},

  // ═══════════════════════════════════════════
  // GRAPH NEURAL NETWORKS
  // ═══════════════════════════════════════════
  { cat: "Graph Neural Networks", gen() { return t(
    "What is the unifying idea behind all GNN architectures?",
    "Neural message passing",
    "Each iteration, nodes aggregate information from neighbors, transform it with learned parameters, and update hidden representations.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "What are the three steps of the MPNN (Message Passing Neural Network) pattern?",
    "Message, Aggregate, Update",
    "1. Message: compute m_uv from sender/receiver/edge features. 2. Aggregate: combine messages from neighbors. 3. Update: produce new node embedding.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "Which GNN architecture replaces fixed aggregation weights with learned attention coefficients?",
    "GAT",
    "Graph Attention Network (GAT) uses attention to learn how much each neighbor matters, with multiple attention heads for different motifs.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "What does GraphSAGE stand for?",
    "SAmple and aggreGatE",
    "GraphSAGE = SAmple and aggreGatE. It samples a fixed number of neighbors per hop and aggregates, enabling inductive learning on unseen nodes.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "What problem occurs when many GNN layers are stacked, causing node representations to converge?",
    "Oversmoothing",
    "Repeated message passing makes node representations converge toward similar vectors, erasing local distinctions — the oversmoothing problem.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "GCN's spatial view aggregation is similar to what kind of filter on graph signals?",
    "Low-pass filter",
    "GCN's normalized sum/mean of neighbor features acts like a low-pass filter — good for homophily where connected nodes resemble each other.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "In ARIA, does the retrieval stack use a trained GNN or symbolic graph traversal?",
    "Symbolic graph traversal",
    "ARIA uses symbolic Neo4j nodes/edges + Cypher, NOT trained GNN encoders. GraphRAG is symbolic retrieval, not differentiable graph learning.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "What type of GNN model assigns type-specific transformations for graphs with multiple node/edge types?",
    "R-GCN",
    "Relational GCNs (R-GCN) assign type-specific transformations for heterogeneous graphs. HGT is another architecture for this.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "In GNN terminology, what is the difference between transductive and inductive learning?",
    "Transductive trains on fixed nodes; inductive generalizes to unseen nodes",
    "Transductive: all nodes exist at training time. Inductive: expects new nodes at test time (GraphSAGE-style). Leakage across edges is a key pitfall.",
    true
  ); }},
  { cat: "Graph Neural Networks", gen() { return t(
    "After k layers of message passing, a node's embedding captures roughly what neighborhood size?",
    "k-hop neighborhood",
    "Stacking k GNN layers gives each node a receptive field of roughly its k-hop neighborhood, analogous to k-hop Cypher traversal.",
    true
  ); }},

  // ═══════════════════════════════════════════
  // MCP PROTOCOL
  // ═══════════════════════════════════════════
  { cat: "MCP Protocol", gen() { return t(
    "What does MCP stand for?",
    "Model Context Protocol",
    "MCP = Model Context Protocol — an open standard for connecting LLM applications to external data sources and tools.",
    true
  ); }},
  { cat: "MCP Protocol", gen() { return t(
    "How many tools does ARIA's MCP server expose (graph_query, vector_search, hybrid_retrieve, fetch_regulation)?",
    4,
    "Four tools: graph_query, vector_search, hybrid_retrieve, and fetch_regulation."
  ); }},
  { cat: "MCP Protocol", gen() { return t(
    "What MCP method allows clients to discover available tools with metadata and JSON Schema?",
    "list_tools()",
    "list_tools() implements tool discovery — it returns the list of TOOL_DEFINITIONS with name, description, and input_schema.",
    true
  ); }},
  { cat: "MCP Protocol", gen() { return t(

// ─────────────────────────────────────────────
// GAME ENGINE
// ─────────────────────────────────────────────
let deck = [];
let cardIndex = 0;
let currentCard = null;
let score = 0;
let correct = 0;
let total = 0;
let streakVal = 0;
let answered = false;
const seenPerCat = {};

CATEGORIES.forEach(c => { seenPerCat[c] = { total: 0, done: 0 }; });
QUESTION_BANK.forEach(q => { seenPerCat[q.cat].total++; });

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeck() {
  deck = shuffle(QUESTION_BANK.map((entry, i) => {
    const card = entry.gen();
    card.cat = entry.cat;
    card.idx = i;
    return card;
  }));
  cardIndex = 0;
  CATEGORIES.forEach(c => { seenPerCat[c].done = 0; });
}

function generateDistractors(ans, isText) {
  const opts = new Set();
  opts.add(String(ans));

  if (!isText && typeof ans === "number") {
    const spread = Math.max(1, Math.ceil(Math.abs(ans) * 0.4)) || 1;
    let tries = 0;
    while (opts.size < 4 && tries < 50) {
      const delta = Math.floor(Math.random() * spread * 2) - spread;
      const v = ans + (delta === 0 ? (Math.random() < 0.5 ? 1 : -1) : delta);
      if (v !== ans && v >= 0) opts.add(String(v));
      tries++;
    }
    while (opts.size < 4) opts.add(String(ans + opts.size));
  } else {
    const str = String(ans);
    const pool = QUESTION_BANK
      .filter(e => e.cat === currentCard.cat)
      .map(e => { const c = e.gen(); return String(c.ans); })
      .filter(a => a !== str);
    const unique = [...new Set(pool)];
    shuffle(unique);
    for (const u of unique) { if (opts.size >= 4) break; opts.add(u); }

    if (opts.size < 4) {
      const allAns = QUESTION_BANK.map(e => String(e.gen().ans)).filter(a => a !== str);
      const uniq2 = [...new Set(allAns)];
      shuffle(uniq2);
      for (const u of uniq2) { if (opts.size >= 4) break; opts.add(u); }
    }
    while (opts.size < 4) opts.add(str + " (variant " + opts.size + ")");
  }
  return shuffle([...opts]);
}

// ─────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────
const $catBar = document.getElementById("categoryBar");
const $score = document.getElementById("score");
const $correct = document.getElementById("correctCount");
const $streak = document.getElementById("streak");
const $qCard = document.getElementById("questionCard");
const $qTopic = document.getElementById("questionTopic");
const $qText = document.getElementById("questionText");
const $qCounter = document.getElementById("questionCounter");
const $opts = document.getElementById("optionsGrid");
const $fb = document.getElementById("feedbackBar");
const $next = document.getElementById("nextBtn");
const $end = document.getElementById("endScreen");
const $endTitle = document.getElementById("endTitle");
const $endSummary = document.getElementById("endSummary");

function renderCategoryBar() {
  $catBar.innerHTML = "";
  CATEGORIES.forEach(c => {
    const pill = document.createElement("span");
    pill.className = "category-pill";
    pill.textContent = c;
    const info = seenPerCat[c];
    if (info.done === info.total && info.total > 0) pill.classList.add("completed");
    else if (currentCard && currentCard.cat === c) pill.classList.add("active");
    $catBar.appendChild(pill);
  });
}

function renderMetrics() {
  $score.textContent = score;
  $correct.textContent = correct + " / " + total;
  $streak.textContent = streakVal;
}

function renderQuestion() {
  $qTopic.textContent = currentCard.cat;
  $qText.textContent = currentCard.q;
  $qCounter.textContent = (cardIndex + 1) + " / " + deck.length;

  const options = generateDistractors(currentCard.ans, currentCard.isText);
  $opts.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.addEventListener("click", () => handleAnswer(btn, opt));
    $opts.appendChild(btn);
  });

  $fb.className = "feedback-bar";
  $fb.textContent = "";
  $next.classList.remove("show");
  answered = false;
}

function handleAnswer(btn, chosen) {
  if (answered) return;
  answered = true;
  total++;

  const isCorrect = String(chosen) === String(currentCard.ans);
  const btns = $opts.querySelectorAll(".option-btn");
  btns.forEach(b => {
    b.disabled = true;
    if (String(b.textContent) === String(currentCard.ans)) b.classList.add("correct");
  });

  if (isCorrect) {
    score += 10 + streakVal * 2;
    correct++;
    streakVal++;
    $fb.className = "feedback-bar show correct-fb";
    $fb.textContent = "Correct!";
  } else {
    streakVal = 0;
    btn.classList.add("wrong");
    $fb.className = "feedback-bar show wrong-fb";
    $fb.textContent = currentCard.hint || "The correct answer is: " + currentCard.ans;
  }

  seenPerCat[currentCard.cat].done++;
  renderMetrics();
  renderCategoryBar();
  $next.classList.add("show");
}

function nextCard() {
  cardIndex++;
  if (cardIndex >= deck.length) {
    showEnd();
    return;
  }
  currentCard = deck[cardIndex];
  renderCategoryBar();
  renderQuestion();
}

function showEnd() {
  $qCard.style.display = "none";
  $fb.style.display = "none";
  $next.style.display = "none";
  $end.classList.add("show");
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  $endTitle.textContent = pct >= 80 ? "Excellent work!" : pct >= 50 ? "Good effort!" : "Keep studying!";
  $endSummary.textContent = "You scored " + score + " points — " + correct + " of " + total + " correct (" + pct + "%). Best streak: " + streakVal + ".";
}

function restart() {
  score = 0; correct = 0; total = 0; streakVal = 0;
  $end.classList.remove("show");
  $qCard.style.display = "";
  $fb.style.display = "";
  $next.style.display = "";
  buildDeck();
  currentCard = deck[0];
  renderMetrics();
  renderCategoryBar();
  renderQuestion();
}

$next.addEventListener("click", nextCard);
document.getElementById("restartBtn").addEventListener("click", restart);
